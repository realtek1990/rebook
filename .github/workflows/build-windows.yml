name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter

      - name: Prepare build files
        run: |
          cd windows
          # Copy shared modules from the macOS app bundle
          copy ..\ReBook.app\Contents\Resources\app\i18n.py .
          copy ..\ReBook.app\Contents\Resources\app\converter.py .
          copy ..\ReBook.app\Contents\Resources\app\corrector.py .
          copy ..\ReBook.app\Contents\Resources\app\manual_convert.py .
          copy ..\requirements.txt .

      - name: Generate icon
        run: |
          cd windows
          python -c "
          # Create a simple .ico file from scratch (32x32 blue book icon)
          import struct, zlib
          # Minimal valid .ico with a 32x32 blue square
          width, height = 32, 32
          pixels = []
          for y in range(height):
              row = []
              for x in range(width):
                  # Blue gradient book shape
                  if 4 <= x <= 27 and 2 <= y <= 29:
                      b = int(100 + (y/height)*155)
                      row.extend([b, 100, 50, 255])  # BGRA
                  else:
                      row.extend([0, 0, 0, 0])
              pixels.append(bytes(row))
          # BMP header for ICO
          bmp_data = b''
          for row in reversed(pixels):
              bmp_data += row
          and_mask = b'\x00' * (((width + 31) // 32) * 4 * height)
          bmp_header = struct.pack('<IiiHHIIiiII',
              40, width, height * 2, 1, 32, 0, len(bmp_data) + len(and_mask), 0, 0, 0, 0)
          icon_data = bmp_header + bmp_data + and_mask
          # ICO file
          ico = struct.pack('<HHH', 0, 1, 1)  # Reserved, Type, Count
          ico += struct.pack('<BBBBHHII', width, height, 0, 0, 1, 32, len(icon_data), 22)
          ico += icon_data
          with open('icon.ico', 'wb') as f:
              f.write(ico)
          print('icon.ico created')
          "

      - name: Build with PyInstaller
        run: |
          cd windows
          pyinstaller rebook.spec

      - name: Verify build
        run: |
          dir windows\dist\ReBook.exe

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: windows/installer.iss

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReBook-Windows
          path: windows/dist/ReBook.exe

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReBook-Setup
          path: windows/output/ReBook-Setup-*.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/output/ReBook-Setup-*.exe
            windows/dist/ReBook.exe
