name: Build ReBook Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync backend files
        shell: bash
        run: |
          mkdir -p windows/dist
          cp ReBook.app/Contents/Resources/app/corrector.py windows/dist/
          cp ReBook.app/Contents/Resources/app/converter.py windows/dist/
          cp ReBook.app/Contents/Resources/app/image_translator.py windows/dist/
          cp ReBook.app/Contents/Resources/app/i18n.py windows/dist/
          cp ReBook.app/Contents/Resources/app/manual_convert.py windows/dist/
          cp windows/rebook_win.py windows/dist/
          cp windows/requirements_win.txt windows/dist/requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter
          pip install ebooklib markdown beautifulsoup4 markdownify Pillow PyMuPDF
          pip install litellm || true
          pip install google-genai || true

      - name: Build ReBook.exe
        shell: cmd
        working-directory: windows\dist
        run: |
          pyinstaller ^
            --onefile ^
            --noconsole ^
            --name ReBook ^
            --icon "..\..\assets\icon.ico" ^
            --add-data "i18n.py;." ^
            --add-data "corrector.py;." ^
            --add-data "converter.py;." ^
            --add-data "image_translator.py;." ^
            --add-data "manual_convert.py;." ^
            --add-data "requirements.txt;." ^
            --hidden-import customtkinter ^
            --hidden-import litellm ^
            --hidden-import ebooklib ^
            --hidden-import markdown ^
            --hidden-import bs4 ^
            --hidden-import markdownify ^
            --hidden-import PIL ^
            rebook_win.py

      - name: Stage output
        shell: bash
        run: |
          mkdir -p out
          cp windows/dist/dist/ReBook.exe out/ReBook-2.2.1-Windows.exe
          ls -lh out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReBook-Windows-exe
          path: out/ReBook-2.2.1-Windows.exe
          if-no-files-found: error
          retention-days: 90

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/ReBook-2.2.1-Windows.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## ReBook v2.2.1

            ### Windows
            Pobierz `ReBook-2.2.1-Windows.exe` i uruchom. Przy pierwszym starcie zainstaluje wymagane biblioteki.

            ### macOS
            Pobierz `ReBook.dmg`.

            ### Co nowego w v2.2.1
            - Auto sub-chunking nieudanych segmentów
            - Quality Gate (>30% źródłowego tekstu → re-tłumaczenie)
            - Deep English Cluster Scanner
            - Automatyczna deduplikacja duplikatów rozdziałów
            - 4 krytyczne bugfixy silnika
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
