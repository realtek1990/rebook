name: Build ReBook (Windows, macOS, Linux)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Windows: Build ReBook.exe
  # ═══════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync backend files
        shell: bash
        run: |
          mkdir -p windows/dist
          cp ReBook.app/Contents/Resources/app/corrector.py windows/dist/
          cp ReBook.app/Contents/Resources/app/converter.py windows/dist/
          cp ReBook.app/Contents/Resources/app/image_translator.py windows/dist/
          cp ReBook.app/Contents/Resources/app/i18n.py windows/dist/
          cp ReBook.app/Contents/Resources/app/manual_convert.py windows/dist/
          cp windows/rebook_win.py windows/dist/
          cp windows/requirements_win.txt windows/dist/requirements.txt
          curl -sL "https://www.python.org/ftp/python/3.11.9/python-3.11.9-amd64.exe" -o "windows/dist/python-installer.exe"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter tkinterdnd2
          pip install ebooklib markdown beautifulsoup4 markdownify Pillow PyMuPDF
          pip install litellm || true
          pip install google-genai || true

      - name: Build ReBook.exe
        shell: cmd
        working-directory: windows\dist
        run: |
          pyinstaller ^
            --onefile ^
            --noconsole ^
            --name ReBook ^
            --distpath . ^
            --icon "..\..\assets\icon.ico" ^
            --add-data "i18n.py;." ^
            --add-data "corrector.py;." ^
            --add-data "converter.py;." ^
            --add-data "image_translator.py;." ^
            --add-data "manual_convert.py;." ^
            --add-data "requirements.txt;." ^
            --collect-all customtkinter ^
            --collect-all tkinterdnd2 ^
            --collect-data litellm ^
            --hidden-import customtkinter ^
            --hidden-import litellm ^
            --hidden-import ebooklib ^
            --hidden-import markdown ^
            --hidden-import bs4 ^
            --hidden-import markdownify ^
            --hidden-import PIL ^
            --hidden-import fitz ^
            --hidden-import image_translator ^
            --hidden-import google.genai ^
            rebook_win.py

      - name: Verify build artifacts
        shell: bash
        run: |
          echo "=== windows/dist/ contents ==="
          ls -la windows/dist/
          echo "=== ReBook.exe ==="
          ls -lh windows/dist/ReBook.exe

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build Inno Setup Installer
        shell: cmd
        working-directory: windows
        run: |
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss

      - name: Stage output
        shell: bash
        run: |
          mkdir -p out
          cp windows/output/ReBook-Setup-*.exe out/ReBook-Windows-Installer.exe
          ls -lh out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReBook-Windows-Installer
          path: out/ReBook-Windows-Installer.exe
          if-no-files-found: error
          retention-days: 90

      - name: Publish Windows EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          artifacts: out/ReBook-Windows-Installer.exe
          allowUpdates: true
          generateReleaseNotes: false
          token: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS: Build ReBook.dmg
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ebooklib markdown beautifulsoup4 markdownify Pillow PyMuPDF
          pip install customtkinter litellm || true

      - name: Build ReBook.dmg
        run: |
          chmod +x build_dmg.sh
          ./build_dmg.sh
          ls -lh ReBook.dmg

      - name: Ad-hoc codesign (reduce Gatekeeper friction)
        run: |
          # Sign the .app inside the repo with ad-hoc identity (-)
          # This allows right-click → Open without full notarization
          codesign --force --deep --sign - ReBook.app
          echo "✅ Ad-hoc signed"
          # Rebuild DMG with signed app
          rm -f ReBook.dmg
          ./build_dmg.sh
          ls -lh ReBook.dmg

      - name: Publish macOS DMG to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ReBook.dmg
          allowUpdates: true
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## ReBook v2.5.0

            ### 🍎 macOS
            Pobierz `ReBook.dmg`, zamontuj i przeciągnij **ReBook.app** do folderu Aplikacje.

            ### 🪟 Windows
            Pobierz `ReBook-Windows-Installer.exe` i uruchom.

            ### 🐧 Linux
            Pobierz `ReBook-Linux`, nadaj uprawnienia (`chmod +x`) i uruchom.

            > Wymagane: klucz API (Gemini, OpenAI, Mistral lub inny) — skonfiguruj w Ustawieniach ⚙️

            ### Co nowego w v2.5.0
            - 🐧 Wersja Linux (Ubuntu/Debian/Fedora)
            - 🎨 Wybór języka z listy (ComboBox z 27 językami)
            - ⛔ Przycisk Stop — zatrzymanie trwającej konwersji
            - 🔧 Fix tłumaczeń: dynamiczny prompt, brak biasu EN→PL
            - 📝 Tytuł EPUB i nazwa pliku zawierają język docelowy
            - 🖼️ Nowe profesjonalne logo aplikacji

  # ═══════════════════════════════════════════════════════════════════════════
  # Linux: Build ReBook binary
  # ═══════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev

      - name: Sync backend files
        run: |
          mkdir -p linux/dist
          cp ReBook.app/Contents/Resources/app/corrector.py linux/dist/
          cp ReBook.app/Contents/Resources/app/converter.py linux/dist/
          cp ReBook.app/Contents/Resources/app/image_translator.py linux/dist/
          cp ReBook.app/Contents/Resources/app/i18n.py linux/dist/
          cp linux/rebook_linux.py linux/dist/

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter
          pip install tkinterdnd2 || true
          pip install ebooklib markdown beautifulsoup4 markdownify Pillow PyMuPDF
          pip install litellm || true
          pip install google-genai || true

      - name: Build ReBook binary
        working-directory: linux/dist
        run: |
          pyinstaller \
            --onefile \
            --noconsole \
            --name ReBook-Linux \
            --distpath . \
            --add-data "i18n.py:." \
            --add-data "corrector.py:." \
            --add-data "converter.py:." \
            --add-data "image_translator.py:." \
            --collect-all customtkinter \
            --collect-data litellm \
            --hidden-import customtkinter \
            --hidden-import litellm \
            --hidden-import ebooklib \
            --hidden-import markdown \
            --hidden-import bs4 \
            --hidden-import markdownify \
            --hidden-import PIL \
            --hidden-import fitz \
            --hidden-import image_translator \
            --hidden-import google.genai \
            rebook_linux.py

      - name: Verify build
        run: |
          ls -lh linux/dist/ReBook-Linux
          file linux/dist/ReBook-Linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReBook-Linux
          path: linux/dist/ReBook-Linux
          if-no-files-found: error
          retention-days: 90

      - name: Publish Linux binary to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: linux/dist/ReBook-Linux
          allowUpdates: true
          generateReleaseNotes: false
          token: ${{ secrets.GITHUB_TOKEN }}
