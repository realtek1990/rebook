name: Build ReBook Windows Installer

on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - "ReBook.app/Contents/Resources/app/corrector.py"
      - "ReBook.app/Contents/Resources/app/converter.py"
      - "ReBook.app/Contents/Resources/app/image_translator.py"
      - "ReBook.app/Contents/Resources/app/i18n.py"
      - "assets/**"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── Sync backend ──────────────────────────────────────────────────────────
      - name: Sync backend files to windows/dist
        shell: bash
        run: |
          mkdir -p windows/dist
          cp ReBook.app/Contents/Resources/app/corrector.py windows/dist/
          cp ReBook.app/Contents/Resources/app/converter.py windows/dist/
          cp ReBook.app/Contents/Resources/app/image_translator.py windows/dist/
          cp ReBook.app/Contents/Resources/app/i18n.py windows/dist/
          cp ReBook.app/Contents/Resources/app/manual_convert.py windows/dist/
          cp windows/rebook_win.py windows/dist/
          cp windows/requirements_win.txt windows/dist/requirements.txt
          # Copy icon to windows/ so installer.iss can find it
          cp assets/icon.ico windows/icon.ico
          echo "✅ Synced $(ls windows/dist | wc -l) files"

      # ── Install deps ──────────────────────────────────────────────────────────
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter
          pip install ebooklib markdown beautifulsoup4 markdownify Pillow PyMuPDF
          pip install litellm || echo "litellm partial, continuing"
          pip install google-genai || echo "google-genai partial, continuing"

      # ── Build EXE ─────────────────────────────────────────────────────────────
      - name: Build ReBook.exe with PyInstaller
        shell: cmd
        working-directory: windows\dist
        run: |
          pyinstaller ^
            --onefile ^
            --noconsole ^
            --name ReBook ^
            --icon "..\..\assets\icon.ico" ^
            --add-data "i18n.py;." ^
            --add-data "corrector.py;." ^
            --add-data "converter.py;." ^
            --add-data "image_translator.py;." ^
            --add-data "manual_convert.py;." ^
            --add-data "requirements.txt;." ^
            --hidden-import customtkinter ^
            --hidden-import litellm ^
            --hidden-import ebooklib ^
            --hidden-import markdown ^
            --hidden-import bs4 ^
            --hidden-import markdownify ^
            --hidden-import PIL ^
            rebook_win.py
          echo "=== PyInstaller output ==="
          dir dist\

      # Copy built EXE to windows/ for Inno Setup
      - name: Stage EXE for Inno Setup
        shell: bash
        run: |
          cp windows/dist/dist/ReBook.exe windows/dist/ReBook.exe
          ls -lh windows/dist/ReBook.exe

      # ── Inno Setup (via Chocolatey — pre-installed on Windows runners) ────────
      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --yes --no-progress
          Write-Host "✅ Inno Setup installed via Chocolatey"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /? 2>&1 | Select-Object -First 2

      - name: Build Windows Installer (Inno Setup)
        shell: cmd
        working-directory: windows
        run: |
          echo === Files in windows\dist\ ===
          dir dist\
          echo === Running ISCC ===
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          echo === Output dir ===
          dir output\ || echo (no output dir)

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload installer as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReBook-Windows-Installer
          path: windows/output/*.exe
          if-no-files-found: error
          retention-days: 30

      # ── Release (only on version tags like v2.2.1) ────────────────────────────
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/output/*.exe
            ReBook.dmg
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
