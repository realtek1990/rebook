name: Build ReBook Windows Installer

on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - ".github/workflows/build_windows.yml"
      - "ReBook.app/Contents/Resources/app/corrector.py"
      - "ReBook.app/Contents/Resources/app/converter.py"
      - "ReBook.app/Contents/Resources/app/image_translator.py"
      - "ReBook.app/Contents/Resources/app/i18n.py"
      - "assets/**"
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Sync backend ──────────────────────────────────────────────────────────
      - name: Sync backend files
        shell: bash
        run: |
          mkdir -p windows/dist
          cp ReBook.app/Contents/Resources/app/corrector.py windows/dist/
          cp ReBook.app/Contents/Resources/app/converter.py windows/dist/
          cp ReBook.app/Contents/Resources/app/image_translator.py windows/dist/
          cp ReBook.app/Contents/Resources/app/i18n.py windows/dist/
          cp ReBook.app/Contents/Resources/app/manual_convert.py windows/dist/
          cp windows/rebook_win.py windows/dist/
          cp windows/requirements_win.txt windows/dist/requirements.txt
          echo "✅ Backend synced"

      # ── Install Python deps ───────────────────────────────────────────────────
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter
          pip install ebooklib markdown beautifulsoup4 markdownify Pillow PyMuPDF
          pip install litellm || echo "litellm partial"
          pip install google-genai || echo "google-genai partial"

      # ── Build EXE ─────────────────────────────────────────────────────────────
      - name: Build ReBook.exe with PyInstaller
        shell: cmd
        working-directory: windows\dist
        run: |
          pyinstaller ^
            --onefile ^
            --noconsole ^
            --name ReBook ^
            --icon "..\..\assets\icon.ico" ^
            --add-data "i18n.py;." ^
            --add-data "corrector.py;." ^
            --add-data "converter.py;." ^
            --add-data "image_translator.py;." ^
            --add-data "manual_convert.py;." ^
            --add-data "requirements.txt;." ^
            --hidden-import customtkinter ^
            --hidden-import litellm ^
            --hidden-import ebooklib ^
            --hidden-import markdown ^
            --hidden-import bs4 ^
            --hidden-import markdownify ^
            --hidden-import PIL ^
            rebook_win.py

      - name: Verify and rename EXE
        shell: bash
        run: |
          ls -lh windows/dist/dist/
          mkdir -p dist_out
          cp windows/dist/dist/ReBook.exe dist_out/ReBook-2.2.1-Windows.exe
          ls -lh dist_out/

      # ── Upload as artifact (always) ───────────────────────────────────────────
      - name: Upload EXE as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReBook-Windows-exe
          path: dist_out/ReBook-2.2.1-Windows.exe
          if-no-files-found: error
          retention-days: 90

      # ── Publish to GitHub Release (on tag) ────────────────────────────────────
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist_out/ReBook-2.2.1-Windows.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## ReBook v2.2.1 — Windows

            ### Instalacja
            1. Pobierz `ReBook-2.2.1-Windows.exe`
            2. Uruchom — przy pierwszym uruchomieniu zainstaluje wymagane biblioteki
            3. Skonfiguruj klucz API w Ustawieniach (⚙️)

            ### macOS
            Pobierz `ReBook.dmg` poniżej.

            ### Co nowego
            - Zero-tolerance pipeline: auto sub-chunking, quality gate, deep cluster scanner
            - Automatyczna deduplikacja rozdziałów
            - Adaptive timeout (120s → 600s)
            - 4 krytyczne bugfixy w silniku tłumaczenia
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
